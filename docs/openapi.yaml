  /cron-jobs:
    get:
      summary: List scheduled cron jobs
      operationId: listCronJobs
      tags: [Cron Jobs]
      responses:
        '200':
          description: Configured cron jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CronJob'
        '503':
          description: Cron service not configured
    post:
      summary: Create cron job
      operationId: createCronJob
      tags: [Cron Jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, schedule, prompt]
              properties:
                name: {type: string}
                schedule:
                  type: string
                  description: Standard 5-field cron expression (m h dom mon dow)
                prompt: {type: string}
                channel_uuid:
                  type: string
                  format: uuid
                  description: Optional channel to post to. Defaults to the workspace default channel.
                enabled: {type: boolean, default: true}
                tool_instance_ids:
                  type: array
                  description: Per-cron tool allowlist passed to the cron-agent invocation. Omitted or empty means the agent runs with no infrastructure tools (memory + runbooks only).
                  items: {type: integer}
              description: |
                Unknown fields (e.g. the legacy `mode` or `description`) are
                rejected with 400 — the handler decodes with
                `DisallowUnknownFields`.
      responses:
        '201':
          description: Cron job created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CronJob'}
        '400':
          description: Validation error (bad schedule, missing channel, unknown field, ...)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorResponse'}
        '409':
          description: Duplicate cron job name.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorResponse'}
        '503':
          description: Cron service not configured

  /cron-jobs/{uuid}:
    parameters:
      - name: uuid
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      summary: Get cron job by UUID
      operationId: getCronJob
      tags: [Cron Jobs]
      responses:
        '200':
          description: Cron job details
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CronJob'}
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: Cron service not configured
    put:
      summary: Update cron job
      operationId: updateCronJob
      tags: [Cron Jobs]
      description: |
        Partial patch — only fields present in the body are applied. To leave
        the per-cron tool allowlist alone, omit `tool_instance_ids`; pass an
        explicit empty array to clear it. System cron jobs (`is_system=true`)
        accept all field updates including `enabled`, but cannot be deleted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name: {type: string}
                schedule: {type: string}
                prompt: {type: string}
                channel_uuid:
                  type: string
                  format: uuid
                  description: Pass an empty string to explicitly clear the channel association.
                enabled: {type: boolean}
                tool_instance_ids:
                  type: array
                  items: {type: integer}
                  description: When present, replaces the cron-agent tool allowlist. Omit to leave existing tools untouched; pass `[]` to clear.
      responses:
        '200':
          description: Updated cron job
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CronJob'}
        '400':
          description: Validation error (bad schedule, unknown field, missing channel, ...)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorResponse'}
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Duplicate name conflict.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorResponse'}
        '503':
          description: Cron service not configured
    delete:
      summary: Delete cron job
      operationId: deleteCronJob
      tags: [Cron Jobs]
      responses:
        '204':
          description: Cron job deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            System cron job (`is_system=true`) cannot be deleted. Operators can
            disable it instead via PUT.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorResponse'}
        '503':
          description: Cron service not configured

  /cron-jobs/{uuid}/run:
    parameters:
      - name: uuid
        in: path
        required: true
        schema: {type: string, format: uuid}
    post:
      summary: Manually trigger a cron job
      operationId: runCronJobNow
      tags: [Cron Jobs]
      responses:
        '202':
          description: Job tick accepted and running in the background. Poll the cron job row's last_run_status/last_run_error for the outcome.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, example: started}
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: Cron service not configured

